name: Prune Old Data

on:
  schedule:
    - cron: '0 2 * * *'  # 2am UTC daily
  workflow_dispatch:
    inputs:
      runner:
        description: 'Runner to use'
        type: choice
        options:
          - github
          - aws
        default: 'github'
      retention-days:
        description: 'Delete intermediate data for articles older than this many days'
        type: string
        default: '30'
      dry-run:
        description: 'Print row counts without making any changes'
        type: boolean
        default: false
      no-vacuum:
        description: 'Skip VACUUM ANALYZE after pruning'
        type: boolean
        default: false

jobs:
  prune-old-data:
    runs-on: ${{ inputs.runner == 'aws' && 'self-hosted' || 'ubuntu-latest' }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        if: inputs.runner != 'aws'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        if: inputs.runner != 'aws'
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-prune-old-data-${{ runner.os }}-${{ inputs.runner }}-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Build command arguments
        id: build-args
        run: |
          ARGS="--retention-days ${{ inputs.retention-days || '30' }}"
          if [ "${{ inputs.dry-run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ "${{ inputs.no-vacuum }}" = "true" ]; then
            ARGS="$ARGS --no-vacuum"
          fi
          echo "args=$ARGS" >> $GITHUB_OUTPUT

      - name: Run purge
        env:
          PYTHONPATH: src
          DATABASE_URL: ${{ secrets.NEON_DB_URL }}
        run: poetry run python -m purge ${{ steps.build-args.outputs.args }}

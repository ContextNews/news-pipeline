name: Resolve Entities

on:
  workflow_call:
    inputs:
      runner:
        type: string
        default: 'github'
      published-date:
        type: string
        default: ''
      overwrite:
        type: boolean
        default: false
      load-s3:
        type: boolean
        default: true
      load-rds:
        type: boolean
        default: true
  workflow_dispatch:
    inputs:
      runner:
        description: 'Runner to use'
        type: choice
        options:
          - github
          - aws
        default: 'github'
      published-date:
        description: 'Resolve entities for articles published on this date (UTC, YYYY-MM-DD)'
        type: string
        required: false
        default: ''
      overwrite:
        description: 'Re-resolve entities for articles with existing resolutions'
        type: boolean
        default: false
      load-s3:
        description: 'Load resolved entities to S3'
        type: boolean
        default: true
      load-rds:
        description: 'Load resolved entities to RDS'
        type: boolean
        default: true

jobs:
  resolve-entities:
    runs-on: ${{ inputs.runner == 'aws' && 'self-hosted' || 'ubuntu-latest' }}
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        if: inputs.load-s3
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-west-2

      - name: Set up Python
        if: inputs.runner != 'aws'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        if: inputs.runner != 'aws'
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-resolve-entities-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
        run: poetry install --no-interaction

      - name: Build command arguments
        id: build-args
        run: |
          if [ -n "${{ inputs.published-date }}" ]; then
            ARGS="--published-date ${{ inputs.published-date }}"
          else
            ARGS="--published-date $(date -u +%F)"
          fi
          if [ "${{ inputs.overwrite }}" = "true" ]; then
            ARGS="$ARGS --overwrite"
          fi
          if [ "${{ inputs.load-s3 }}" = "true" ]; then
            ARGS="$ARGS --load-s3"
          fi
          if [ "${{ inputs.load-rds }}" = "true" ]; then
            ARGS="$ARGS --load-rds"
          fi
          echo "args=$ARGS" >> $GITHUB_OUTPUT

      - name: Run resolve_entities
        env:
          PYTHONPATH: src
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          DATABASE_URL: ${{ secrets.NEON_DB_URL }}
        run: poetry run python -m resolve_entities ${{ steps.build-args.outputs.args }}

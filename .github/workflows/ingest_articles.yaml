name: Ingest Articles

on:
  workflow_call:
    inputs:
      lookback-hours:
        type: number
        default: 12
      sources:
        type: string
        default: 'all'
      load-s3:
        type: boolean
        default: true
      load-rds:
        type: boolean
        default: true
  workflow_dispatch:
    inputs:
      lookback-hours:
        description: 'Fetch articles lookback (Hours)'
        type: number
        default: 12
      sources:
        description: 'Sources'
        type: string
        default: 'all'
      load-s3:
        description: 'Load articles to S3'
        type: boolean
        default: true
      load-rds:
        description: 'Load articles to RDS'
        type: boolean
        default: true

jobs:
  ingest-articles:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        if: inputs.load-s3
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-west-2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-ingest-articles-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
        run: poetry install --no-interaction --with ingest_articles

      - name: Build command arguments
        id: build-args
        run: |
          ARGS="--lookback-hours ${{ inputs.lookback-hours }}"
          if [ -n "${{ inputs.sources }}" ]; then
            ARGS="$ARGS --sources ${{ inputs.sources }}"
          fi
          if [ "${{ inputs.load-s3 }}" = "true" ]; then
            ARGS="$ARGS --load-s3"
          fi
          if [ "${{ inputs.load-rds }}" = "true" ]; then
            ARGS="$ARGS --load-rds"
          fi
          echo "args=$ARGS" >> $GITHUB_OUTPUT

      - name: Run ingest_articles
        env:
          PYTHONPATH: src
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          DATABASE_URL: ${{ secrets.NEON_DB_URL }}
        run: poetry run python -m ingest_articles ${{ steps.build-args.outputs.args }}
